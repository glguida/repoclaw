# OpenClaw-like dynamic work uses one planner plus a standing pool of subagents.
# The console/root is launched separately by `git agents start`.

[[agents]]
name = "planner-1"
role = "planner"
engine = "pi"

[[agents]]
name = "subagent-1"
role = "subagent"
engine = "pi"

[[agents]]
name = "subagent-2"
role = "subagent"
engine = "pi"
